<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>12C2 Sanrio Gold Run</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff85a2; --purple: #a29bfe; --bg: #fff5f7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Quicksand', sans-serif; background: var(--bg); color: #444; overflow: hidden; }
        
        /* Navigation */
        .nav-tabs { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 8px; border-radius: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 2000; border: 1px solid white; }
        .tab-btn { padding: 12px 25px; border: none; background: none; border-radius: 30px; font-weight: bold; cursor: pointer; color: #888; transition: 0.3s; }
        .tab-btn.active { background: var(--pink); color: white; }

        .page-section { display: none; height: 100vh; width: 100%; overflow-y: auto; }
        .page-section.active { display: block; }

        /* Game Section */
        #game-view { position: relative; height: 100vh; background: linear-gradient(180deg, #ffdeeb 0%, #fff 100%); overflow: hidden; }
        .score-box { position: absolute; top: 20px; left: 20px; background: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; color: var(--pink); z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #player { position: absolute; bottom: 120px; width: 33.33%; display: flex; justify-content: center; font-size: 60px; transition: left 0.15s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 50; }
        .item { position: absolute; width: 33.33%; display: flex; justify-content: center; font-size: 40px; z-index: 10; }

        /* Members Section */
        #member-list { padding: 20px 20px 100px; text-align: center; }
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
        .member-card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid #eee; }
        .member-card.nu { border-color: var(--pink); }
        .member-card.nam { border-color: var(--purple); }

        /* Overlay */
        #overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .btn-restart { padding: 15px 40px; background: var(--pink); color: white; border: none; border-radius: 50px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showSection('game')">🎮 Game</button>
        <button class="tab-btn" onclick="showSection('members')">👥 12C2</button>
    </div>

    <section id="game-section" class="page-section active">
        <div id="game-view">
            <div class="score-box" id="score-val">⭐ 0</div>
            <div id="player" style="left: 33.33%;">🎀</div>
            <div id="overlay">
                <h1 style="color:var(--pink)">Hết lượt!</h1>
                <p id="final-score" style="font-size:20px"></p>
                <button class="btn-restart" onclick="resetGame()">CHƠI LẠI</button>
            </div>
        </div>
    </section>

    <section id="members-section" class="page-section">
        <div id="member-list">
            <h1 style="color: var(--pink);">Thành Viên 12C2</h1>
            <div class="member-grid" id="memberGrid"></div>
        </div>
    </section>

    <script>
        const members = [
            {n:"Lưu Hồng An", g:"Nữ"}, {n:"Lê Thị Quế An", g:"Nữ"}, {n:"Trịnh Thị Mỹ Anh", g:"Nữ"},
            {n:"Phạm Quốc Bảo", g:"Nam"}, {n:"Nguyễn Như Bảo", g:"Nam"}, {n:"Trần Quang Cảnh", g:"Nam"},
            {n:"Phạm Đức Chí Công", g:"Nam"}, {n:"Nguyễn Công Danh", g:"Nam"}, {n:"Phùng Tấn Đạt", g:"Nam"},
            {n:"Hoàng Vũ Thùy Dung", g:"Nữ"}, {n:"Đỗ Duy Dũng", g:"Nam"}, {n:"Lý Nam Hải", g:"Nam"},
            {n:"Nguyễn Thị Ngọc Hân", g:"Nữ"}, {n:"Ngô Tri Huy Hoàng", g:"Nam"}, {n:"Nguyễn Đỗ Phi Hùng", g:"Nam"},
            {n:"Trần Chấn Huy", g:"Nam"}, {n:"Trần Gia Huy", g:"Nam"}, {n:"Đặng Trần Mạnh Khang", g:"Nam"},
            {n:"Nguyễn Huỳnh Bá Khang", g:"Nam"}, {n:"Nguyễn Bá Khánh", g:"Nam"}, {n:"Võ Tuấn Khoa", g:"Nam"},
            {n:"Lý Anh Khoa", g:"Nam"}, {n:"Nguyễn Văn Duy Khoa", g:"Nam"}, {n:"Võ Phạm Đăng Khoa", g:"Nam"},
            {n:"Lê Minh Khôi", g:"Nam"}, {n:"Nguyễn Châu Khuê", g:"Nữ"}, {n:"Lê Thị Thảo Linh", g:"Nữ"},
            {n:"Trương Ngọc Linh", g:"Nữ"}, {n:"Lê Hoàng Long", g:"Nam"}, {n:"Khưu Tú Minh", g:"Nữ"},
            {n:"Nguyễn Nhật Minh", g:"Nam"}, {n:"Kiều My My", g:"Nữ"}, {n:"Trương Ngọc Thảo Ngân", g:"Nữ"},
            {n:"Thái Hà Mẫn Nghi", g:"Nữ"}, {n:"Trần Trọng Nghĩa", g:"Nam"}, {n:"Trần Hoàn Bảo Ngọc", g:"Nữ"},
            {n:"Phạm Đình Khôi Nguyên", g:"Nam"}, {n:"Trương Nguyễn Phúc", g:"Nam"}, {n:"Thạch Bảo Tài", g:"Nam"},
            {n:"Nguyễn Phước Thành", g:"Nam"}, {n:"Nguyễn Ngọc Thanh Trà", g:"Nữ"}, {n:"Phan Thùy Trang", g:"Nữ"},
            {n:"Nguyễn Thị Thanh Trúc", g:"Nữ"}, {n:"Nguyễn Đặng Khắc Trường", g:"Nam"}, {n:"Đàm Kim Tuyền", g:"Nữ"},
            {n:"Nguyễn Mỹ Phương Uyên", g:"Nữ"}, {n:"Hồ Quốc Việt", g:"Nam"}, {n:"Âu Dương Vịnh", g:"Nam"}
        ];

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id + '-section').classList.add('active');
            event.currentTarget.classList.add('active');
        }

        const grid = document.getElementById('memberGrid');
        grid.innerHTML = members.map(m => `
            <div class="member-card ${m.g === 'Nữ' ? 'nu' : 'nam'}">
                <div style="font-size:30px">${m.g === 'Nữ' ? '👩‍🎓' : '👨‍🎓'}</div>
                <div style="font-weight:bold; margin-top:5px; font-size:14px">${m.n}</div>
            </div>
        `).join('');

        let lane = 1; let score = 0; let active = true;
        document.getElementById('game-view').addEventListener('touchstart', e => {
            if(!active) return;
            if(e.touches[0].clientX < window.innerWidth/2 && lane > 0) lane--;
            else if(e.touches[0].clientX >= window.innerWidth/2 && lane < 2) lane++;
            document.getElementById('player').style.left = (lane * 33.33) + "%";
        });

        function spawn() {
            if(!active || !document.getElementById('game-section').classList.contains('active')) return;
            const item = document.createElement('div');
            const isCoin = Math.random() > 0.4;
            const l = Math.floor(Math.random()*3);
            item.className = 'item';
            item.innerText = isCoin ? '🟡' : '🧱';
            item.style.left = (l*33.33) + "%";
            item.style.top = "-50px";
            document.getElementById('game-view').appendChild(item);

            let t = -50;
            function fall() {
                if(!active) { item.remove(); return; }
                t += 6; item.style.top = t + "px";
                if(t > window.innerHeight - 180 && t < window.innerHeight - 100 && l === lane) {
                    if(isCoin) { score += 10; document.getElementById('score-val').innerText = "⭐ " + score; item.remove(); return; }
                    else { active = false; document.getElementById('overlay').style.display = 'flex'; document.getElementById('final-score').innerText = "Điểm: " + score; return; }
                }
                if(t < window.innerHeight) requestAnimationFrame(fall);
                else item.remove();
            }
            requestAnimationFrame(fall);
        }
        setInterval(spawn, 1000);

        function resetGame() {
            active = true; score = 0; lane = 1;
            document.getElementById('score-val').innerText = "⭐ 0";
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('player').style.left = "33.33%";
            document.querySelectorAll('.item').forEach(i => i.remove());
        }
    </script>
</body>
</html>
